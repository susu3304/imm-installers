name: Build IMM installers

on:
  workflow_dispatch:
    inputs:
      imm_ref:
        description: IMM branch, tag, or commit SHA to package
        required: false
        default: main
      force:
        description: Publish even if this upstream commit already has a release
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types:
      - imm-updated
      - imm-released
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: imm-installers
  cancel-in-progress: false

env:
  IMM_REPOSITORY: susu3304/InsaneMarmotMatrixLanguage
  HOMEBREW_TAP_REPOSITORY: susu3304/homebrew-imm

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.existing.outputs.should_release }}
      upstream_sha: ${{ steps.version.outputs.upstream_sha }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      deb_version: ${{ steps.version.outputs.deb_version }}
      msi_version: ${{ steps.version.outputs.msi_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Resolve upstream ref
        id: ref
        env:
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          MANUAL_REF: ${{ inputs.imm_ref }}
        run: |
          set -euo pipefail
          ref="${DISPATCH_SHA:-${DISPATCH_REF:-${MANUAL_REF:-main}}}"
          if [ -z "$ref" ]; then
            ref=main
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout IMM source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMM_REPOSITORY }}
          ref: ${{ steps.ref.outputs.ref }}
          path: imm-src
          fetch-depth: 0

      - name: Compute package versions
        id: version
        run: packaging/scripts/compute-version.sh imm-src

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force || 'false' }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$FORCE" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $RELEASE_TAG already exists; skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  linux-deb:
    runs-on: ubuntu-22.04
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout IMM source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.upstream_sha }}
          path: imm-src

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build Debian package
        run: packaging/scripts/build-deb.sh imm-src "${{ needs.prepare.outputs.deb_version }}" dist

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: imm-linux-deb
          path: dist/*.deb
          if-no-files-found: error

  windows-msi:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout IMM source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.upstream_sha }}
          path: imm-src

      - name: Build MSI
        shell: pwsh
        run: |
          packaging/scripts/build-msi.ps1 `
            -SourceDir imm-src `
            -ProductVersion "${{ needs.prepare.outputs.msi_version }}" `
            -OutDir dist

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: imm-windows-msi
          path: dist/*.msi
          if-no-files-found: error

  macos-tarball:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact_arch: x64
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout IMM source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMM_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.upstream_sha }}
          path: imm-src

      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"

      - name: Build macOS tarball
        run: packaging/scripts/build-macos-tarball.sh imm-src "${{ matrix.target }}" dist

      - name: Upload macOS tarball
        uses: actions/upload-artifact@v4
        with:
          name: imm-macos-${{ matrix.artifact_arch }}
          path: dist/imm-macos-${{ matrix.artifact_arch }}.tar.gz
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - linux-deb
      - windows-msi
      - macos-tarball
    if: needs.prepare.outputs.should_release == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: imm-*
          path: dist
          merge-multiple: true

      - name: Install APT repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Build APT repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          deb_file=$(find dist -maxdepth 1 -name '*.deb' -print -quit)
          if [ -z "$deb_file" ]; then
            echo "no .deb artifact found" >&2
            exit 1
          fi
          packaging/scripts/build-apt-repo.sh "$deb_file" "${{ needs.prepare.outputs.deb_version }}" site/apt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          UPSTREAM_SHA: ${{ needs.prepare.outputs.upstream_sha }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
        run: |
          set -euo pipefail
          release_notes="Built from susu3304/InsaneMarmotMatrixLanguage@${UPSTREAM_SHA}. Windows MSI installs imm.exe and adds it to PATH. Ubuntu APT installs /usr/bin/imm. macOS tarballs feed the Homebrew tap."
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes "$release_notes"
            gh release upload "$RELEASE_TAG" dist/*.deb dist/*.msi dist/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.deb dist/*.msi dist/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes "$release_notes"
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          FORMULA_VERSION: ${{ needs.prepare.outputs.deb_version }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_DEPLOY_KEY:-}" ]; then
            echo "HOMEBREW_TAP_DEPLOY_KEY is not set; skipping tap update"
            exit 0
          fi

          install -d -m 0700 ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/imm_homebrew_tap
          chmod 600 ~/.ssh/imm_homebrew_tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          GIT_SSH_COMMAND="ssh -i ~/.ssh/imm_homebrew_tap -o IdentitiesOnly=yes" \
            git clone "git@github.com:${HOMEBREW_TAP_REPOSITORY}.git" tap

          packaging/scripts/update-homebrew-formula.sh \
            "$RELEASE_TAG" \
            "$FORMULA_VERSION" \
            dist/imm-macos-arm64.tar.gz \
            dist/imm-macos-x64.tar.gz \
            tap/Formula/imm.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "Homebrew formula already up to date"
            exit 0
          fi
          git add Formula/imm.rb
          git commit -m "Update IMM formula to ${FORMULA_VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/imm_homebrew_tap -o IdentitiesOnly=yes" git push origin main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
