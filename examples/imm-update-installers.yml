name: Update IMM installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "imm-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger installer repository
        env:
          GH_TOKEN: ${{ secrets.INSTALLER_REPO_DISPATCH_TOKEN }}
          INSTALLER_REPO: susu3304/imm-installers
          IMM_SHA: ${{ github.sha }}
          IMM_REF: ${{ github.ref_name }}
          IMM_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::INSTALLER_REPO_DISPATCH_TOKEN is not set"
            exit 1
          fi

          gh api "repos/${INSTALLER_REPO}/dispatches" \
            -f event_type=imm-updated \
            -f client_payload[sha]="$IMM_SHA" \
            -f client_payload[ref]="$IMM_REF" \
            -f client_payload[source_repository]="$IMM_REPOSITORY"
